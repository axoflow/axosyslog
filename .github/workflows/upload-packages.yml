name: Upload package to R2/incoming


on:
  workflow_call:
    inputs:
      pkg-type:
        required: true
        type: string  # stable / nightly
      distros:
        required: false
        type: string
        default: >
          [
            {"type": "deb", "name": "debian-testing"},
            {"type": "deb", "name": "debian-sid"},
            {"type": "deb", "name": "debian-bullseye"},
            {"type": "deb", "name": "debian-bookworm"},
            {"type": "deb", "name": "debian-trixie"},
            {"type": "deb", "name": "ubuntu-focal"},
            {"type": "deb", "name": "ubuntu-jammy"},
            {"type": "deb", "name": "ubuntu-noble"},
            {"type": "deb", "name": "ubuntu-plucky"},
            {"type": "deb", "name": "ubuntu-questing"},
            {"type": "deb", "name": "ubuntu-resolute"},

            {"type": "rpm", "name": "almalinux-8"},
            {"type": "rpm", "name": "almalinux-9"},
            {"type": "rpm", "name": "almalinux-10"},
            {"type": "rpm", "name": "fedora-44"}
          ]
    secrets:
      r2-access-key:
        required: true
      r2-secret-key:
        required: true
      r2-account-id:
        required: true


permissions: {}

jobs:
  upload-packages:
    name: ${{ matrix.distro.name }} (${{ matrix.distro.type }})
    permissions: {}

    runs-on: ubuntu-latest

    if: github.repository_owner == 'axoflow'

    strategy:
      matrix:
        distro: ${{ fromJson(inputs.distros) }}
      fail-fast: false

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: package-${{ matrix.distro.name }}
          path: package

      - name: Upload packages to R2 incoming
        working-directory: package
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.r2-access-key }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.r2-secret-key }}
            AWS_DEFAULT_REGION: auto
            AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
            AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
            R2_ACCOUNT_ID: ${{ secrets.r2-account-id }}
            PKG_TYPE: ${{ inputs.pkg-type }}
            RUN_ID: ${{ github.run_id }}
            DISTRO_TYPE: ${{ matrix.distro.type }}
        run: |
          find * -type f | xargs -I {} \
            aws s3api put-object \
              --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com \
              --bucket axoflow-packages-build \
              --key ${PKG_TYPE}/${RUN_ID}/${DISTRO_TYPE}/{} \
              --body {}
