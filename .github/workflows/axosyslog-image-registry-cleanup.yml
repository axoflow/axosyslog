name: AxoSyslog image registry cleanup

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image name'
        required: true
        default: 'axosyslog'
        type: string

jobs:
  cleanup-untagged-images:
    permissions:
      packages: write  # delete untagged images from GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: MrAnno/delete-untagged-ghcr-action@4a33ce3cf2456d2aef98a1b6c60a12dad56cffd9
        with:
          token: ${{ github.token }}
          repository_owner: ${{ github.repository_owner }}
          repository: ${{ github.repository }}
          package_name: ${{ inputs.image_name }}
          untagged_only: true
          owner_type: org
          except_untagged_multiplatform: true
