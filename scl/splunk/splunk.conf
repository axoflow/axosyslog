@requires json-plugin

# https://docs.splunk.com/Documentation/Splunk/9.0.4/RESTREF/RESTinput#services.2Fcollector.2Fraw.2F1.0
block destination splunk_hec_raw(
  url()
  token()
  channel()

  default_index("main")
  default_source("axosyslog")
  default_sourcetype("syslog")

  template("${S_ISODATE} ${HOST} ${MSGHDR}${MSG}\n")

  batch_lines(5000)
  batch_bytes(4096kB)
  batch_timeout(0)
  workers(8)
  timeout(10)

  content_type("text/plain")
  extra_headers("")
  extra_queries("")
  use_system_cert_store(yes)
  ...)
{

@requires http "The splunk-hec-raw() driver depends on the AxoSyslog http module, please install the axosyslog-mod-http (Debian & derivatives) or the axosyslog-http (RHEL & co) package"

  http(
    url("`url`/services/collector/raw/1.0?channel=`channel`&index=`default_index`&source=`default_source`&sourcetype=`default_sourcetype``extra_queries`")
    headers(
      "Authorization: Splunk `token`"
      "Content-Type: `content_type`"
      "Connection: keep-alive"
      `extra_headers`
    )
    body(`template`)
    batch-lines(`batch_lines`)
    batch-bytes(`batch_bytes`)
    batch-timeout(`batch_timeout`)
    workers(`workers`)
    timeout(`timeout`)
    use_system_cert_store(`use_system_cert_store`)
    `__VARARGS__`
  );
};

# https://docs.splunk.com/Documentation/Splunk/9.0.4/RESTREF/RESTinput#services.2Fcollector.2Fevent.2F1.0
block destination splunk_hec_event(
  url()
  token()

  default_index("main")
  default_source("axosyslog")
  default_sourcetype("nix:syslog")

  index("")
  source("")
  sourcetype("")
  host("${HOST}")
  time("${S_UNIXTIME}.${S_MSEC}")
  fields("")

  event("${MSG}")

  batch_lines(5000)
  batch_bytes(4096kB)
  batch_timeout(0)
  workers(8)
  timeout(10)

  content_type("application/json")
  extra_headers("")
  extra_queries("")
  use_system_cert_store(yes)
  ...)
{

@requires http "The splunk-hec-event() driver depends on the AxoSyslog http module, please install the axosyslog-mod-http (Debian & derivatives) or the axosyslog-http (RHEL & co) package"

  http(
    url("`url`/services/collector/event/1.0?index=`default_index`&source=`default_source`&sourcetype=`default_sourcetype``extra_queries`")
    headers(
      "Authorization: Splunk `token`"
      "Content-Type: `content_type`"
      "Connection: keep-alive"
      `extra_headers`
    )
    body('$(format-json --scope none --omit-empty-values
              index="`index`"
              source="`source`"
              sourcetype="`sourcetype`"
              host="`host`"
              time="`time`"
              event="`event`"
              fields=$(if ("`fields`" ne "") $(format-flat-json --scope none `fields`) ""))'
    )
    batch-lines(`batch_lines`)
    batch-bytes(`batch_bytes`)
    batch-timeout(`batch_timeout`)
    timeout(`timeout`)
    workers(`workers`)
    use_system_cert_store(`use_system_cert_store`)
    `__VARARGS__`
  );
};

#############################################################################
#
# Splunk HTTP Event Collector (HEC) source.
#
# This source listens on an HTTP endpoint and accepts events sent in the
# Splunk HEC JSON event format, for example:
#
#   POST /services/collector/event HTTP/1.1
#   Authorization: Splunk <token>
#
#   {"time": 1426279439, "host": "host", "source": "src", "sourcetype": "st", "index": "main", "event": "hello world", "fields": {"foo": "bar"}}
#
# Multiple events may be batched in a single request, one JSON object per
# line. The underlying http() source splits the request body at newlines, so
# each line is processed as a separate event.
#
# https://docs.splunk.com/Documentation/Splunk/latest/Data/HECRESTendpoints
# https://docs.splunk.com/Documentation/Splunk/latest/Data/FormateventsforHTTPEventCollector

@requires json-plugin

block source splunk_hec(
  port(8088)
  localip("")
  prefix(".splunk.")
  ...)
{

@requires http-source "The splunk_hec() source depends on the AxoSyslog http-source module, please install the axosyslog-mod-http-source (Debian & derivatives) or the axosyslog-http-source (RHEL & co) package"

  channel {
    source {
      # The standard Splunk HEC JSON event endpoints. They all share the same
      # listening port; each http() instance registers one URL on it.
      http(port(`port`) localip("`localip`") path("/services/collector") `__VARARGS__`);
      http(port(`port`) localip("`localip`") path("/services/collector/event") `__VARARGS__`);
      http(port(`port`) localip("`localip`") path("/services/collector/event/1.0") `__VARARGS__`);
    };

    parser {
      # Extract the HEC envelope (event, host, time, source, sourcetype,
      # index, fields, ...) into name-value pairs below `prefix`.
      json-parser(prefix("`prefix`"));
    };

    rewrite {
      # Promote the "event" field to the message. When "event" is a JSON
      # object rather than a string, json-parser flattens it into
      # `prefix`event.* and ${`prefix`event} is empty, so the original JSON
      # body is kept as the message instead.
      set("${`prefix`event}" value("MESSAGE") condition("${`prefix`event}" ne ""));
      set("${`prefix`host}" value("HOST") condition("${`prefix`host}" ne ""));
    };

    # The HEC "time" field is an epoch timestamp (seconds, optionally with a
    # fractional part). Use it as the message timestamp when present.
    if ("${`prefix`time}" ne "") {
      parser {
        date-parser(
          template("${`prefix`time}")
          format("%s.%f" "%s")
        );
      };
    };
  };

  channel {
    source {
      # The standard Splunk HEC RAW event endpoints. They all share the same
      # listening port; each http() instance registers one URL on it.
      http(port(`port`) localip("`localip`") path("/services/collector/raw") `__VARARGS__`);
      http(port(`port`) localip("`localip`") path("/services/collector/raw/1.0") `__VARARGS__`);
    };

    parser {
      syslog-parser();
    };

  };
};
