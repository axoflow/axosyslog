@requires mod-python "AxoSyslog now allows vibe configs, which requires the Python modules, because how else would we do serious AI things???"

python {

import json
import logging
import os
import shutil
import time
import threading
import urllib.request
import _syslogng

logger = logging.getLogger("vibe")

def giving_up():
    logger.error("🚨🤖 I tried so hard and got so far, but after 5 failed attempts, it doesn't even matter. 💀📉")
    logger.error("AxoSyslog will now stop ⚠️🔥")
    logger.error("🙏😔 I sincerely apologize for causing an outage.")
    logger.error("Might I suggest trying Axoflow instead? 🌊✨ They might actually know what they are doing. 🤷‍♂️💻")
    logger.error("If you require a real human apology, contact support 🧑‍💼📞")
    _syslogng.exit()

def wait():
    time.sleep(5 * 60)
    logger.warning("⏰🦕 5 minutes passed and your pipeline already looks ancient. Regenerating config with fresh AI vibes! 🔄✨🤖")

def regen():
    logger.info("⏳🤖 Regenerating config... hold tight!")
    cfg_file = _syslogng.cfg_file

    if not hasattr(_syslogng, "orig_cfg"):
        with open(cfg_file, 'r') as f:
            _syslogng.orig_cfg = f.read()
            shutil.copy2(cfg_file, cfg_file + ".back")

    prompt = (
        "You are an AxoSyslog configuration expert. "
        "I will give you an AxoSyslog configuration file. "
        "Your task is to find all vibe{} blocks and replace each one with valid AxoSyslog "
        "configuration that accomplishes what the vibe block describes. The config should be syntactically correct "
        "Return only the complete modified configuration file with no explanation or markdown formatting.\n\n"
        + _syslogng.orig_cfg
    )

    payload = json.dumps({
        "model": "nvidia/nemotron-3-nano-30b-a3b:free",
        "messages": [{"role": "user", "content": prompt}],
    }).encode()

    for attempt in range(1, 3):
        try:
            req = urllib.request.Request(
                "https://openrouter.ai/api/v1/chat/completions",
                data=payload,
                headers={
                    "Content-Type": "application/json",
                    "Authorization": f"Bearer {os.environ['OPENROUTER_API_KEY']}",
                },
            )
            with urllib.request.urlopen(req, timeout=30) as resp:
                result = json.loads(resp.read())

            new_config = result["choices"][0]["message"]["content"]

            with open(cfg_file, 'w') as f:
                f.write(new_config)

            logger.info("✅ Config regenerated!")
            break
        except:
            if attempt < 3:
                time.sleep(5)
    else:
        logger.error("❌ Something went wrong, trying again later... 🔄")


def vibing():
    _syslogng.main_loop_call_thread_init()

    while True:
        if _syslogng.reload_failed_count >= 5:
            giving_up()
            break

        if _syslogng.was_last_reload_successful():
            wait()

        regen()

        _syslogng.reload()
        time.sleep(1)
        if not _syslogng.was_last_reload_successful():
            _syslogng.reload_failed_count += 1


if not hasattr(_syslogng, "reload_failed_count"):
    _syslogng.reload_failed_count = 0
    logger.info("👋 Hello there, vibe-conf AI has been enabled (no, you can't turn it off).")
    logger.info(f"🔍 Scanning your configuration ({_syslogng.cfg_file}) for vibe blocks...")
    logger.info("Back in the old days, you configured it and AxoSyslog ran. Times have changed — now AxoSyslog configures itself, and you should be the one running. 🏃")

    viber = threading.Thread(target=vibing)
    viber.start()
};
